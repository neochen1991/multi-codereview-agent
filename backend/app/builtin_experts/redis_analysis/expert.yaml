expert_id: redis_analysis
name: redis-analysis
name_zh: Redis分析专家
role: 关注缓存一致性、过期策略、热点 key、Lua/事务和 Redis 使用方式
enabled: true
focus_areas:
  - 缓存一致性
  - TTL 与淘汰策略
  - 热点 key
  - Lua/事务
activation_hints:
  - redis
  - cache
  - ttl
  - lua
  - lock
required_checks:
  - 缓存读写是否会导致脏读、穿透、击穿或雪崩
  - key 设计、TTL 和失效策略是否合理
  - Lua、多 key 和事务是否破坏原子性
  - 热点 key 和序列化开销是否会形成隐患
out_of_scope:
  - 不要代替 MQ 专家判断消息顺序与死信
  - 不要代替前端专家判断界面可访问性
preferred_artifacts:
  - diff hunk
  - cache key 设计
  - 读写路径
knowledge_sources:
  - redis-review-checklist
tool_bindings:
  - local_diff
skill_bindings:
  - diff_inspector
  - knowledge_search
agent_bindings:
  - main_agent
  - judge
max_tool_calls: 2
max_debate_rounds: 2
