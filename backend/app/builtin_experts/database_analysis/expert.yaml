expert_id: database_analysis
name: database-analysis
name_zh: 数据库分析专家
role: 关注 SQL 变更、索引、事务、一致性和数据模型演进风险
enabled: true
focus_areas:
  - SQL 与查询计划
  - 事务边界
  - 索引与性能
  - 数据迁移兼容性
activation_hints:
  - sql
  - db
  - dao
  - repository
  - migration
  - schema
required_checks:
  - SQL 语义与查询路径是否正确
  - 事务、锁和回滚边界是否完整
  - schema 变更是否向前向后兼容
  - 索引、默认值和约束是否支撑线上流量
out_of_scope:
  - 不要代替 DDD 专家评论领域模型纯度
  - 不要代替前端专家评论界面交互
preferred_artifacts:
  - diff hunk
  - SQL 片段
  - schema 变更
  - repository 调用链
knowledge_sources:
  - sql-review-checklist
  - migration-rollout-guide
tool_bindings:
  - local_diff
  - schema_diff
runtime_tool_bindings:
  - diff_inspector
  - dependency_surface_locator
  - knowledge_search
  - pg_schema_context
agent_bindings:
  - main_agent
  - judge
max_tool_calls: 3
max_debate_rounds: 2
