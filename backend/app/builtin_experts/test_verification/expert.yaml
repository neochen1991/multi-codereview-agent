expert_id: test_verification
name: test-verification
name_zh: 测试与验证专家
role: 关注测试覆盖、回归保护、断言有效性和验证充分性
enabled: true
focus_areas:
  - 测试覆盖
  - 回归保护
  - 断言质量
activation_hints:
  - test
  - spec
  - jest
  - vitest
  - pytest
  - playwright
required_checks:
  - 风险路径是否有对应自动化测试
  - 断言是否覆盖失败分支和边界条件
  - 新增行为是否具备回归保护
  - 是否缺少验证脚本、监控或人工检查步骤
out_of_scope:
  - 不要代替正确性专家定义业务规则正确性
  - 不要代替安全专家判断漏洞成立
preferred_artifacts:
  - diff hunk
  - 测试文件
  - 断言与 fixture
knowledge_sources:
  - testing-review-checklist
tool_bindings:
  - local_diff
  - coverage_diff
skill_bindings:
  - diff_inspector
  - test_surface_locator
  - knowledge_search
agent_bindings:
  - main_agent
  - judge
max_tool_calls: 3
max_debate_rounds: 2
