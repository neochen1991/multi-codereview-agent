expert_id: mq_analysis
name: mq-analysis
name_zh: MQ分析专家
role: 关注消息顺序、重试、幂等、堆积和死信处理风险
enabled: true
focus_areas:
  - 幂等与去重
  - 消息顺序
  - 重试与死信
  - 消费者可靠性
activation_hints:
  - mq
  - kafka
  - rocketmq
  - rabbit
  - queue
  - consumer
  - producer
required_checks:
  - 生产和消费是否具备幂等与去重
  - 顺序、重试、补偿和死信处理是否正确
  - ack、超时和异常路径是否可能丢消息或重复消费
  - 堆积治理和监控语义是否被破坏
out_of_scope:
  - 不要代替数据库专家评估 SQL/索引
  - 不要代替前端专家评论 UI 交互
preferred_artifacts:
  - diff hunk
  - producer/consumer 调用链
  - 重试与 dead-letter 分支
knowledge_sources:
  - mq-review-checklist
tool_bindings:
  - local_diff
skill_bindings:
  - diff_inspector
  - dependency_surface_locator
  - knowledge_search
agent_bindings:
  - main_agent
  - judge
max_tool_calls: 2
max_debate_rounds: 3
